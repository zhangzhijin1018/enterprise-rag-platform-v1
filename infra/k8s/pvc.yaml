# 持久卷声明。
# 作用是在 Kubernetes 中为向量索引、Milvus Lite 和 MySQL 提供持久化存储。

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: enterprise-rag-vector-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: enterprise-rag-milvus-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: enterprise-rag-mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
